<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Nautilius Command</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body class="command-layout">

        <main id="nautilius-core">
            <section id="mantra-module">
                <div class="header-ticker"> <span>INITIALIZATION... INITIALIZATION... INITIALIZATION...</span></div>
                <section id="system-status-text"></section>
                <div id="mantra-text"></div>
                <div id="system-logs"></div>
                <div class="energy-bar"></div>
                
            </section>
            <div class="status-line active-pulse">
                SYSTEM STATUS: OPTIMAL | LOCATION: DEEP SEA
                </div>
            <section id="biometry-module">
                <div class="data-slot">
                    <span class="label">BMI STATUS</span>
                    <span id="bmi-result">0.0</span>                    
                </div>
                <button id="ignite-trigger">Ignite the Spark</button>
            </section>
            
        </main>
        
        <script src="app.js" ></script>
    </body>
</html>
